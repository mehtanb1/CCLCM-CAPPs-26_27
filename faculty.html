<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAAPPs Tutor Faculty Dashboard</title>
<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f2eb;
    color: #1a1814;
    margin: 0;
    padding: 24px;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border: 1px solid #ddd8cc;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  h1 {
    font-size: 28px;
    margin: 0 0 4px;
  }

  .sub {
    color: #6f675f;
    font-size: 14px;
    margin-bottom: 20px;
  }

  input {
  padding: 10px 12px;
  border: 1px solid #c8c2b4;
  border-radius: 8px;
  font-size: 14px;
  width: 280px;
  max-width: 100%;
}

select {
  padding: 10px 12px;
  border: 1px solid #c8c2b4;
  border-radius: 8px;
  font-size: 14px;
  min-width: 180px;
  background: #fff;
}

.filter-label {
  display: block;
  font-size: 12px;
  color: #6f675f;
  margin-bottom: 4px;
}

.checkbox-row {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 13px;
  color: #4a4540;
  padding-bottom: 10px;
}

.checkbox-row input {
  width: auto;
}

  button {
    background: #2d6a4f;
    color: #fff;
    border: 0;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .stat {
    background: #fff;
    border: 1px solid #ddd8cc;
    border-radius: 10px;
    padding: 12px 16px;
    min-width: 140px;
  }

  .stat .num {
    font-size: 22px;
    font-weight: 700;
    color: #2d6a4f;
  }

  .stat .lbl {
    font-size: 12px;
    color: #6f675f;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #ddd8cc;
    border-radius: 12px;
    overflow: hidden;
  }

  th, td {
    border-bottom: 1px solid #eee8dc;
    padding: 10px;
    font-size: 13px;
    text-align: left;
    vertical-align: top;
  }

  th {
    background: #ede9e0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #4a4540;
  }

  tr:hover td {
    background: #faf8f4;
  }

  .mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
  }

  .pill {
    display: inline-block;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  .complete {
    background: #d8ede3;
    color: #2d6a4f;
  }

  .late {
    background: #fce8e6;
    color: #c0392b;
  }

  .error {
    color: #c0392b;
    margin-top: 12px;
  }

  details {
    max-width: 480px;
  }

  summary {
    cursor: pointer;
    color: #2d6a4f;
    font-weight: 600;
  }

  pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #faf8f4;
    border: 1px solid #ddd8cc;
    border-radius: 8px;
    padding: 10px;
    max-height: 300px;
    overflow: auto;
  }
  .detail-section {
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid #eee8dc;
}

.detail-section:last-child {
  border-bottom: 0;
}

.detail-title {
  font-size: 12px;
  color: #6f675f;
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 6px;
  font-weight: 700;
}

.detail-box {
  background: #faf8f4;
  border: 1px solid #ddd8cc;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  line-height: 1.55;
  white-space: pre-wrap;
}

.chat-line {
  margin-bottom: 8px;
}

.chat-role {
  font-weight: 700;
  color: #2d6a4f;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>CAPPs Tutor Faculty Dashboard</h1>
    <div class="sub">Faculty view of CAPPs Tutor student exercise performance.</div>

    <div id="loginBox">
      <input type="password" id="password" placeholder="Faculty dashboard password">
      <button onclick="loadDashboard()">Load dashboard</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="stats">
      <div class="stat">
        <div class="num" id="statRows">0</div>
        <div class="lbl">Rows</div>
      </div>
      <div class="stat">
        <div class="num" id="statStudents">0</div>
        <div class="lbl">Students</div>
      </div>
      <div class="stat">
        <div class="num" id="statQuestions">0</div>
        <div class="lbl">Questions</div>
      </div>
      <div class="stat">
        <div class="num" id="statLate">0</div>
        <div class="lbl">Late</div>
      </div>
      <div class="stat">
  <div class="num" id="statRosterStudents">0</div>
  <div class="lbl">Roster Students</div>
</div>
<div class="stat">
  <div class="num" id="statPAs">0</div>
  <div class="lbl">PAs</div>
</div>
    </div>

    <div class="card">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
    <div>
      <label class="filter-label">PA</label>
      <select id="paFilter" onchange="applyFilters()">
        <option value="">All PAs</option>
      </select>
    </div>

    <div>
      <label class="filter-label">Class</label>
      <select id="classFilter" onchange="applyFilters()">
        <option value="">All classes</option>
      </select>
    </div>

    <div>
      <label class="filter-label">Course</label>
      <select id="courseFilter" onchange="applyFilters()">
        <option value="">All courses</option>
      </select>
    </div>

    <div>
      <label class="filter-label">Week / Question</label>
      <select id="questionFilter" onchange="applyFilters()">
        <option value="">All questions</option>
      </select>
    </div>

    <div>
      <label class="filter-label">Search</label>
      <input type="text" id="searchFilter" placeholder="Student, email, topic..." oninput="applyFilters()">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="lateOnlyFilter" onchange="applyFilters()">
      Late only
    </label>

    <button onclick="loadDashboard()">Refresh</button>
  </div>
</div>

    <div id="tableWrap"></div>
    <div id="summaryWrap" style="margin-top:16px"></div>
  </div>
</div>

<script>
let lastPassword = '';
let dashboardRows = [];
let dashboardStudents = [];
let dashboardPAs = [];
async function loadDashboard() {
  const password = document.getElementById('password')?.value || lastPassword;
  const loginError = document.getElementById('loginError');
  if (loginError) loginError.textContent = '';

  if (!password) {
    if (loginError) loginError.textContent = 'Enter the dashboard password.';
    return;
  }

  lastPassword = password;

  const button = document.querySelector('button');
  if (button) button.disabled = true;

  try {
    const response = await fetch('/.netlify/functions/faculty-performance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok || !data.ok) {
      throw new Error(data.error || 'Dashboard load failed.');
    }

    document.getElementById('dashboard').style.display = 'block';
    dashboardRows = data.performance?.rows || [];
    dashboardStudents = data.students?.rows || [];
    dashboardPAs = data.pas?.rows || [];

    populateFilters(dashboardRows, dashboardPAs);
renderDashboard(dashboardRows, dashboardStudents, dashboardPAs);
  } catch (err) {
    if (loginError) loginError.textContent = err.message || 'Dashboard load failed.';
  } finally {
    if (button) button.disabled = false;
  }
}
function populateFilters(rows = [], pasRoster = []) {
  populatePAFilter(pasRoster);
  populateClassFilter(rows);
  populateCourseFilter(rows);
  populateQuestionFilter(rows);
}

function setOptions(selectId, options, allLabel) {
  const select = document.getElementById(selectId);
  if (!select) return;

  const current = select.value;
  select.innerHTML = `<option value="">${esc(allLabel)}</option>` + options.map(opt => {
    return `<option value="${esc(opt.value)}">${esc(opt.label)}</option>`;
  }).join('');

  select.value = options.some(opt => opt.value === current) ? current : '';
}

function populatePAFilter(pasRoster = []) {
  const activePAs = pasRoster
    .filter(pa => String(pa.active || '').toLowerCase() === 'true')
    .map(pa => {
      const email = String(pa.paEmail || '').trim();
      return {
        value: email,
        label: `${pa.paName || email} (${email})`
      };
    })
    .filter(pa => pa.value)
    .sort((a, b) => a.label.localeCompare(b.label));

  setOptions('paFilter', activePAs, 'All PAs');
}

function populateClassFilter(rows = []) {
  const values = [...new Set(rows.map(r => r.classId).filter(Boolean))].sort();
  setOptions('classFilter', values.map(v => ({ value: v, label: v })), 'All classes');
}

function populateCourseFilter(rows = []) {
  const values = [...new Set(rows.map(r => r.courseId).filter(Boolean))].sort();
  setOptions('courseFilter', values.map(v => ({ value: v, label: v })), 'All courses');
}

function populateQuestionFilter(rows = []) {
  const seen = {};
  rows.forEach(r => {
    const id = String(r.questionId || '').trim();
    if (!id) return;
    const label = `${r.weekLabel || 'Week ?'} · Q${r.questionNumber || '?'} · ${r.topic || id}`;
    seen[id] = label;
  });

  const options = Object.entries(seen)
    .map(([value, label]) => ({ value, label }))
    .sort((a, b) => a.label.localeCompare(b.label));

  setOptions('questionFilter', options, 'All questions');
}

function applyFilters() {
  renderDashboard(dashboardRows, dashboardStudents, dashboardPAs);
}
function renderDashboard(rows, studentsRoster = [], pasRoster = []) {
  const selectedPA = String(document.getElementById('paFilter')?.value || '').trim().toLowerCase();
  const selectedClass = String(document.getElementById('classFilter')?.value || '').trim();
  const selectedCourse = String(document.getElementById('courseFilter')?.value || '').trim();
  const selectedQuestion = String(document.getElementById('questionFilter')?.value || '').trim();
  const lateOnly = !!document.getElementById('lateOnlyFilter')?.checked;
  const searchText = String(document.getElementById('searchFilter')?.value || '').trim().toLowerCase();

  const studentByEmail = {};
  studentsRoster.forEach(s => {
    const email = String(s.googleEmail || '').trim().toLowerCase();
    if (email) studentByEmail[email] = s;
  });

  const filteredRows = rows.filter(row => {
    const rowEmail = String(row.googleEmail || '').trim().toLowerCase();
    const rosterMatch = studentByEmail[rowEmail] || {};
    const assignedPA = String(rosterMatch.assignedPAEmail || '').trim().toLowerCase();

    if (selectedPA && assignedPA !== selectedPA) return false;
    if (selectedClass && String(row.classId || '') !== selectedClass) return false;
    if (selectedCourse && String(row.courseId || '') !== selectedCourse) return false;
    if (selectedQuestion && String(row.questionId || '') !== selectedQuestion) return false;
    if (lateOnly && String(row.isLate).toLowerCase() !== 'true') return false;

    if (searchText) {
      const haystack = [
        row.studentName,
        row.googleEmail,
        row.studentUUID,
        row.courseId,
        row.courseName,
        row.questionId,
        row.weekLabel,
        row.topic,
        assignedPA
      ].join(' ').toLowerCase();

      if (!haystack.includes(searchText)) return false;
    }

    return true;
  });

  const students = new Set(filteredRows.map(r => r.studentUUID || r.googleEmail || r.studentName).filter(Boolean));
  const questions = new Set(filteredRows.map(r => r.questionId).filter(Boolean));
  const lateRows = filteredRows.filter(r => String(r.isLate).toLowerCase() === 'true');

  document.getElementById('statRows').textContent = filteredRows.length;
  document.getElementById('statStudents').textContent = students.size;
  document.getElementById('statQuestions').textContent = questions.size;
  document.getElementById('statLate').textContent = lateRows.length;
  document.getElementById('statRosterStudents').textContent = studentsRoster.length;
  document.getElementById('statPAs').textContent = pasRoster.length;

  const sorted = [...filteredRows].sort((a, b) => {
    return String(b.completedAt || b.submittedAt || '').localeCompare(String(a.completedAt || a.submittedAt || ''));
  });

  renderStudentSummary(filteredRows, studentsRoster);

  const tableRows = sorted.map(row => {
    const payload = parsePayload(row.fullRecordJson);
    const status = row.completedAt ? 'Complete' : 'In progress';
    const late = String(row.isLate).toLowerCase() === 'true';

    const rowEmail = String(row.googleEmail || '').trim().toLowerCase();
    const rosterMatch = studentByEmail[rowEmail] || {};
    const assignedPA = rosterMatch.assignedPAEmail || '';

    return `
      <tr>
        <td>
          ${esc(row.studentName)}
          <div class="mono">${esc(row.googleEmail)}</div>
          ${assignedPA ? `<div class="mono">PA: ${esc(assignedPA)}</div>` : ''}
        </td>
        <td class="mono">${esc(row.studentUUID)}</td>
        <td>
          ${esc(row.courseId)}
          <div class="mono">${esc(row.classId)} · ${esc(row.academicYear)}</div>
        </td>
        <td>
          ${esc(row.weekLabel)} · Q${esc(row.questionNumber)}
          <div class="mono">${esc(row.questionId)}</div>
        </td>
        <td>${esc(row.topic)}</td>
        <td><span class="pill complete">${esc(status)}</span>${late ? ' <span class="pill late">Late</span>' : ''}</td>
        <td>${esc(row.conceptsMastered)} / ${esc(row.totalConcepts)}</td>
        <td>${esc(row.totalExchanges)}</td>
        <td>${esc(row.timeMinutes)}m</td>
        <td>${formatDate(row.completedAt || row.submittedAt)}</td>
        <td>
  ${renderDetailViewer(row, payload)}
</td>
      </tr>
    `;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>UUID</th>
          <th>Course</th>
          <th>Question</th>
          <th>Topic</th>
          <th>Status</th>
          <th>Concepts</th>
          <th>Exchanges</th>
          <th>Time</th>
          <th>Completed/Saved</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows || '<tr><td colspan="11">No records found.</td></tr>'}
      </tbody>
    </table>
  `;
}
  function renderDetailViewer(row, payload) {
  const record = payload || row || {};

  const selfConcepts = Array.isArray(record.selfConcepts) ? record.selfConcepts : [];
  const socraticHistory = Array.isArray(record.socraticHistory) ? record.socraticHistory : [];
  const masteredConcepts = record.masteredConcepts || {};
  const essayCitations = record.essayCitations || {};

  const selfHtml = selfConcepts.length ? selfConcepts.map((c, i) => `
    <div class="detail-box" style="margin-bottom:8px">
      <strong>${esc(i + 1)}. ${esc(c.concept || 'Concept')}</strong>
      <br>${esc(c.knowledge || '')}
    </div>
  `).join('') : '<div class="detail-box">No self-assessment saved.</div>';

  const chatHtml = socraticHistory.length ? socraticHistory.map(m => `
    <div class="chat-line">
      <span class="chat-role">${esc(m.role === 'user' ? 'Student' : 'Tutor')}:</span>
      ${esc(m.content || '')}
    </div>
  `).join('') : '<div class="detail-box">No Socratic transcript saved for this submission.</div>';

  const masteredHtml = Object.entries(masteredConcepts).length ? Object.entries(masteredConcepts).map(([id, m]) => `
    <div class="detail-box" style="margin-bottom:8px">
      <strong>${esc(m.label || id)}</strong>
      <br>${esc(m.summary || '')}
      ${m.citation ? `<br><span class="mono">Citation: ${esc(m.citation)}</span>` : ''}
    </div>
  `).join('') : '<div class="detail-box">No mastered concept details saved.</div>';

  const citationsHtml = Object.entries(essayCitations).length ? Object.entries(essayCitations).map(([id, citation]) => `
    <div class="mono">${esc(id)}: ${esc(citation)}</div>
  `).join('') : '<div class="detail-box">No citations saved.</div>';

  return `
    <details>
      <summary>View Details</summary>

      <div class="detail-section" style="margin-top:10px">
        <div class="detail-title">Question</div>
        <div class="detail-box">
          ${esc(record.courseId || row.courseId || '')} · ${esc(record.weekLabel || row.weekLabel || '')} · Q${esc(record.questionNumber || row.questionNumber || '')}
          <br><strong>${esc(record.topic || row.topic || '')}</strong>
          <br><span class="mono">${esc(record.questionId || row.questionId || '')}</span>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-title">Self-assessment</div>
        ${selfHtml}
      </div>

      <div class="detail-section">
        <div class="detail-title">Socratic conversation</div>
        <div class="detail-box">${chatHtml}</div>
      </div>

      <div class="detail-section">
        <div class="detail-title">Mastered concepts</div>
        ${masteredHtml}
      </div>

      <div class="detail-section">
        <div class="detail-title">Essay</div>
        <div class="detail-box">${esc(record.essayText || row.essayText || 'No essay saved.')}</div>
      </div>

      <div class="detail-section">
        <div class="detail-title">Citations</div>
        <div class="detail-box">${citationsHtml}</div>
      </div>

      <div class="detail-section">
        <div class="detail-title">Reflection</div>
        <div class="detail-box">
          <strong>Comparison:</strong>
          <br>${esc(record.reflectionText || row.reflectionText || '')}
          <br><br><strong>New learning:</strong>
          <br>${esc(record.reflectionLearned || row.reflectionLearned || '')}
        </div>
      </div>

      <details>
        <summary>Raw JSON</summary>
        <pre>${esc(JSON.stringify(record || row, null, 2))}</pre>
      </details>
    </details>
  `;
}
function renderStudentSummary(rows, studentsRoster = []) {
  const wrap = document.getElementById('summaryWrap');
  if (!wrap) return;

  const studentByEmail = {};
  studentsRoster.forEach(s => {
    const email = String(s.googleEmail || '').trim().toLowerCase();
    if (email) studentByEmail[email] = s;
  });

  const grouped = {};
  rows.forEach(row => {
    const key = String(row.googleEmail || row.studentUUID || row.studentName || 'unknown').trim().toLowerCase();
    if (!grouped[key]) {
      const rosterMatch = studentByEmail[String(row.googleEmail || '').trim().toLowerCase()] || {};
      grouped[key] = {
        studentName: row.studentName || rosterMatch.studentName || key,
        googleEmail: row.googleEmail || rosterMatch.googleEmail || '',
        assignedPAEmail: rosterMatch.assignedPAEmail || '',
        completed: 0,
        late: 0,
        exchanges: 0,
        time: 0,
        questions: new Set(),
        courses: new Set()
      };
    }

    grouped[key].completed += 1;
    if (String(row.isLate).toLowerCase() === 'true') grouped[key].late += 1;
    grouped[key].exchanges += Number(row.totalExchanges || 0);
    grouped[key].time += Number(row.timeMinutes || 0);
    if (row.questionId) grouped[key].questions.add(row.questionId);
    if (row.courseId) grouped[key].courses.add(row.courseId);
  });

  const summaries = Object.values(grouped).sort((a, b) => a.studentName.localeCompare(b.studentName));

  const rowsHtml = summaries.map(s => {
    const avgExchanges = s.completed ? (s.exchanges / s.completed).toFixed(1) : '0';
    const avgTime = s.completed ? (s.time / s.completed).toFixed(1) : '0';

    return `
      <tr>
        <td>
          ${esc(s.studentName)}
          <div class="mono">${esc(s.googleEmail)}</div>
          ${s.assignedPAEmail ? `<div class="mono">PA: ${esc(s.assignedPAEmail)}</div>` : ''}
        </td>
        <td>${esc(s.completed)}</td>
        <td>${esc(s.late)}</td>
        <td>${esc(avgExchanges)}</td>
        <td>${esc(avgTime)}m</td>
        <td>${esc(s.courses.size)}</td>
        <td>${esc(s.questions.size)}</td>
      </tr>
    `;
  }).join('');

  wrap.innerHTML = `
    <div class="card">
      <h2 style="font-size:20px;margin:0 0 12px">Student Summary</h2>
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Completed</th>
            <th>Late</th>
            <th>Avg Exchanges</th>
            <th>Avg Time</th>
            <th>Courses</th>
            <th>Questions</th>
          </tr>
        </thead>
        <tbody>
          ${rowsHtml || '<tr><td colspan="7">No student summary available.</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}
function parsePayload(text) {
  if (!text) return null;
  try {
    return JSON.parse(text);
  } catch {
    return { raw: text };
  }
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString();
  } catch {
    return iso;
  }
}

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
