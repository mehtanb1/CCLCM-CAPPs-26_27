<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedTutor Faculty Dashboard</title>
<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f2eb;
    color: #1a1814;
    margin: 0;
    padding: 24px;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border: 1px solid #ddd8cc;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  h1 {
    font-size: 28px;
    margin: 0 0 4px;
  }

  .sub {
    color: #6f675f;
    font-size: 14px;
    margin-bottom: 20px;
  }

  input {
    padding: 10px 12px;
    border: 1px solid #c8c2b4;
    border-radius: 8px;
    font-size: 14px;
    width: 280px;
    max-width: 100%;
  }

  button {
    background: #2d6a4f;
    color: #fff;
    border: 0;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .stat {
    background: #fff;
    border: 1px solid #ddd8cc;
    border-radius: 10px;
    padding: 12px 16px;
    min-width: 140px;
  }

  .stat .num {
    font-size: 22px;
    font-weight: 700;
    color: #2d6a4f;
  }

  .stat .lbl {
    font-size: 12px;
    color: #6f675f;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #ddd8cc;
    border-radius: 12px;
    overflow: hidden;
  }

  th, td {
    border-bottom: 1px solid #eee8dc;
    padding: 10px;
    font-size: 13px;
    text-align: left;
    vertical-align: top;
  }

  th {
    background: #ede9e0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #4a4540;
  }

  tr:hover td {
    background: #faf8f4;
  }

  .mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
  }

  .pill {
    display: inline-block;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  .complete {
    background: #d8ede3;
    color: #2d6a4f;
  }

  .late {
    background: #fce8e6;
    color: #c0392b;
  }

  .error {
    color: #c0392b;
    margin-top: 12px;
  }

  details {
    max-width: 480px;
  }

  summary {
    cursor: pointer;
    color: #2d6a4f;
    font-weight: 600;
  }

  pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #faf8f4;
    border: 1px solid #ddd8cc;
    border-radius: 8px;
    padding: 10px;
    max-height: 300px;
    overflow: auto;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>MedTutor Faculty Dashboard</h1>
    <div class="sub">Reads completed exercise records from the Google Sheet PerformanceLog tab.</div>

    <div id="loginBox">
      <input type="password" id="password" placeholder="Faculty dashboard password">
      <button onclick="loadDashboard()">Load dashboard</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="stats">
      <div class="stat">
        <div class="num" id="statRows">0</div>
        <div class="lbl">Rows</div>
      </div>
      <div class="stat">
        <div class="num" id="statStudents">0</div>
        <div class="lbl">Students</div>
      </div>
      <div class="stat">
        <div class="num" id="statQuestions">0</div>
        <div class="lbl">Questions</div>
      </div>
      <div class="stat">
        <div class="num" id="statLate">0</div>
        <div class="lbl">Late</div>
      </div>
      <div class="stat">
  <div class="num" id="statRosterStudents">0</div>
  <div class="lbl">Roster Students</div>
</div>
<div class="stat">
  <div class="num" id="statPAs">0</div>
  <div class="lbl">PAs</div>
</div>
    </div>

    <div class="card">
      <button onclick="loadDashboard()">Refresh</button>
    </div>

    <div id="tableWrap"></div>
  </div>
</div>

<script>
let lastPassword = '';

async function loadDashboard() {
  const password = document.getElementById('password')?.value || lastPassword;
  const loginError = document.getElementById('loginError');
  if (loginError) loginError.textContent = '';

  if (!password) {
    if (loginError) loginError.textContent = 'Enter the dashboard password.';
    return;
  }

  lastPassword = password;

  const button = document.querySelector('button');
  if (button) button.disabled = true;

  try {
    const response = await fetch('/.netlify/functions/faculty-performance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok || !data.ok) {
      throw new Error(data.error || 'Dashboard load failed.');
    }

    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(data.performance?.rows || [], data.students?.rows || [], data.pas?.rows || []);
  } catch (err) {
    if (loginError) loginError.textContent = err.message || 'Dashboard load failed.';
  } finally {
    if (button) button.disabled = false;
  }
}

function renderDashboard(rows, studentsRoster = [], pasRoster = []) {
  const students = new Set(rows.map(r => r.studentUUID || r.googleEmail || r.studentName).filter(Boolean));
  const questions = new Set(rows.map(r => r.questionId).filter(Boolean));
  const lateRows = rows.filter(r => String(r.isLate).toLowerCase() === 'true');

  document.getElementById('statRows').textContent = rows.length;
  document.getElementById('statStudents').textContent = students.size;
  document.getElementById('statQuestions').textContent = questions.size;
  document.getElementById('statLate').textContent = lateRows.length;
document.getElementById('statRosterStudents').textContent = studentsRoster.length;
document.getElementById('statPAs').textContent = pasRoster.length;
  const sorted = [...rows].sort((a, b) => {
  return String(b.completedAt || b.submittedAt || '').localeCompare(String(a.completedAt || a.submittedAt || ''));
});

  const tableRows = sorted.map(row => {
  const payload = parsePayload(row.fullRecordJson);
  const status = row.completedAt ? 'Complete' : 'In progress';
  const late = String(row.isLate).toLowerCase() === 'true';

  return `
    <tr>
      <td>
        ${esc(row.studentName)}
        <div class="mono">${esc(row.googleEmail)}</div>
      </td>
      <td class="mono">${esc(row.studentUUID)}</td>
      <td>
        ${esc(row.courseId)}
        <div class="mono">${esc(row.classId)} · ${esc(row.academicYear)}</div>
      </td>
      <td>
        ${esc(row.weekLabel)} · Q${esc(row.questionNumber)}
        <div class="mono">${esc(row.questionId)}</div>
      </td>
      <td>${esc(row.topic)}</td>
      <td><span class="pill complete">${esc(status)}</span>${late ? ' <span class="pill late">Late</span>' : ''}</td>
      <td>${esc(row.conceptsMastered)} / ${esc(row.totalConcepts)}</td>
      <td>${esc(row.timeMinutes)}m</td>
      <td>${formatDate(row.completedAt || row.submittedAt)}</td>
      <td>
        <details>
          <summary>View JSON</summary>
          <pre>${esc(JSON.stringify(payload || row, null, 2))}</pre>
        </details>
      </td>
    </tr>
  `;
}).join('');
  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>UUID</th>
          <th>Course</th>
          <th>Question</th>
          <th>Topic</th>
          <th>Status</th>
          <th>Concepts</th>
          <th>Time</th>
          <th>Completed/Saved</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows || '<tr><td colspan="10">No records found.</td></tr>'}
      </tbody>
    </table>
  `;
}

function parsePayload(text) {
  if (!text) return null;
  try {
    return JSON.parse(text);
  } catch {
    return { raw: text };
  }
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString();
  } catch {
    return iso;
  }
}

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
